<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interstellar Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <main class="login-shell">
        <section class="login-card">
            <div class="login-panel">
                <p class="eyebrow">Member Access</p>
                <h1 class="login-title">Enter the Mission Archive</h1>
                <p class="lead">
                 the page explains teh scinetific concepts involved in interstellar
                </p>
                <ul class="login-list">
                    <li>best scifi of all time</li>
                    <li>A cris nolan masterpiece</li>
                    <li>explore movie details</li>
                </ul>
            </div>

            <div class="login-form-wrap">
                <div>
                    <p class="section-tag">Login</p>
                    <h2>Sign In</h2>
                    <p class="form-note"></p>
                </div>

                <form class="login-form" action="#" method="post">
                    <label for="login-email">Email</label>
                    <input id="login-email" name="email" type="email" placeholder="name@example.com" required>

                    <label for="login-password">Password</label>
                    <input id="login-password" name="password" type="password" placeholder="Enter your password" required>

                    <button class="submit-button" type="submit">Login</button>
                </form>

                <p class="form-note">
                    Return to the documentary:
                    <a class="text-link" href="index.html">Back to home</a>
                </p>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
